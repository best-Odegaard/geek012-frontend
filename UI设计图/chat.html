<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>途灵 - AI行程助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f0f4f3; }
        .soft-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .message-ai { border-top-left-radius: 4px; }
        .message-user { border-top-right-radius: 4px; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">
<!-- Mobile Container -->
<div class="w-[375px] h-[812px] bg-[#F9FDFB] relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-white flex flex-col">
<!-- Header -->
<header class="px-5 pt-12 pb-4 flex items-center justify-between border-b border-[#E8F5F2] bg-white">
<div class="flex items-center">
<a class="text-[#5A7B74] text-2xl mr-3" href="home.html">
<iconify-icon icon="ri:arrow-left-s-line"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-[#5A7B74]">AI行程助手</h1>
</div>
<button class="text-[#A8E6CF] text-sm font-medium">保存草稿</button>
</header>
<!-- Chat Area -->
<main class="flex-1 overflow-y-auto p-5 space-y-6 hide-scrollbar" id="chat-container">
<!-- AI Message -->
<div class="flex items-start gap-3">
<div class="w-8 h-8 rounded-full bg-[#A8E6CF] flex items-center justify-center text-white shrink-0">
<iconify-icon icon="ri:robot-2-line"></iconify-icon>
</div>
<div class="bg-[#D1F2EB] text-[#5A7B74] p-3.5 rounded-2xl message-ai text-sm max-w-[80%] soft-shadow">
                    你好！我是你的行程助手，想去哪里玩呢？😊
                </div>
</div>
<!-- User Message -->
<div class="flex items-start justify-end gap-3">
<div class="bg-[#A8E6CF] text-white p-3.5 rounded-2xl message-user text-sm max-w-[80%] soft-shadow">
                    我想去肇庆玩一天
                </div>
</div>
<!-- AI Message -->
<div class="flex items-start gap-3">
<div class="w-8 h-8 rounded-full bg-[#A8E6CF] flex items-center justify-center text-white shrink-0">
<iconify-icon icon="ri:robot-2-line"></iconify-icon>
</div>
<div class="bg-[#D1F2EB] text-[#5A7B74] p-3.5 rounded-2xl message-ai text-sm max-w-[80%] soft-shadow">
                    已收到：肇庆、1天。有什么偏好吗？自然风光、人文还是美食？
                </div>
</div>
<!-- User Message -->
<div class="flex items-start justify-end gap-3">
<div class="bg-[#A8E6CF] text-white p-3.5 rounded-2xl message-user text-sm max-w-[80%] soft-shadow">
                    自然风光吧，还有不用太累
                </div>
</div>
<!-- AI Message -->
<div class="flex items-start gap-3">
<div class="w-8 h-8 rounded-full bg-[#A8E6CF] flex items-center justify-center text-white shrink-0">
<iconify-icon icon="ri:robot-2-line"></iconify-icon>
</div>
<div class="bg-[#D1F2EB] text-[#5A7B74] p-3.5 rounded-2xl message-ai text-sm max-w-[80%] soft-shadow">
                    好的，已记录：肇庆、1天、自然风光、悠闲。还有什么具体的景点想去吗？
                </div>
</div>
</main>
<!-- Input Area -->
<footer class="p-5 bg-white border-t border-[#E8F5F2]">
<div class="flex items-center gap-3 mb-4">
<div class="flex-1 h-12 bg-[#E8F5F2] rounded-full px-5 flex items-center">
<input class="w-full bg-transparent outline-none text-sm text-[#5A7B74]" id="chat-input" placeholder="输入你的需求..." type="text"/>
<button class="text-[#5A7B74] text-xl ml-2">
<iconify-icon icon="ri:mic-line"></iconify-icon>
</button>
</div>
<button class="w-12 h-12 bg-[#A8E6CF] rounded-full flex items-center justify-center text-white text-xl shadow-lg shadow-[#A8E6CF]/30 active:scale-95 transition-transform" id="send-btn">
<iconify-icon icon="ri:send-plane-fill"></iconify-icon>
</button>
</div>
<a class="w-full h-12 bg-gradient-to-r from-[#A8E6CF] to-[#B5EAD7] text-white rounded-full flex items-center justify-center text-sm font-bold shadow-lg shadow-[#A8E6CF]/30" href="itinerary.html">
                生成行程计划
            </a>
</footer>
</div>
<script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser ? 'flex items-start justify-end gap-3' : 'flex items-start gap-3';
            
            const content = isUser ? `
                <div class="bg-[#A8E6CF] text-white p-3.5 rounded-2xl message-user text-sm max-w-[80%] soft-shadow">
                    ${text}
                </div>
            ` : `
                <div class="w-8 h-8 rounded-full bg-[#A8E6CF] flex items-center justify-center text-white shrink-0">
                    <iconify-icon icon="ri:robot-2-line"></iconify-icon>
                </div>
                <div class="bg-[#D1F2EB] text-[#5A7B74] p-3.5 rounded-2xl message-ai text-sm max-w-[80%] soft-shadow">
                    ${text}
                </div>
            `;
            
            msgDiv.innerHTML = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) {
                appendMessage(text, true);
                chatInput.value = '';
                
                // Simulate AI response
                setTimeout(() => {
                    appendMessage("好的，正在为您优化方案...", false);
                }, 1000);
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
